<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para Tami 💜</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Segoe UI;
overflow-x:hidden;
overflow-y:auto;
scroll-behavior:smooth;
}

/* fundo */

.bg{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#000000 40%,#140022 100%);
z-index:-1;
}

/* titulo bem-vinda */

.titulo{
position:absolute;
top:30%;
width:100%;
text-align:center;
font-size:60px;
letter-spacing:4px;
opacity:0;
color:#f3e8ff;
text-shadow:0 0 10px #c77dff,0 0 40px #9d4edd;
animation:fadeTitulo 4s forwards;
}

@keyframes fadeTitulo{
from{opacity:0; transform:translateY(-40px);}
to{opacity:1; transform:translateY(0);}
}

/* intro */

.intro{
position:absolute;
top:55%;
width:60%;
left:20%;
font-size:22px;
line-height:1.7;
opacity:0;
animation:introTexto 4s forwards;
animation-delay:3s;
}

@keyframes introTexto{
to{opacity:1;}
}

/* container principal */

.container{
position:absolute;
top:120vh;
width:70%;
left:15%;
font-size:22px;
line-height:1.8;
display:none;
padding-bottom:300px;
}

/* brilho */

.amor{
color:#e0aaff;
text-shadow:0 0 10px #c77dff,0 0 30px #9d4edd;
animation:brilho 2s infinite alternate;
}

@keyframes brilho{
from{ text-shadow:0 0 5px #c77dff;}
to{ text-shadow:0 0 35px #e0aaff;}
}

/* corações */

.coracao{
position:absolute;
color:#c77dff;
font-size:20px;
animation:cair linear infinite;
}

@keyframes cair{
0%{ transform:translateY(-10vh); opacity:1;}
100%{ transform:translateY(110vh); opacity:0;}
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="titulo">Bem-vinda</div>

<div class="intro" id="introTexto"></div>

<div class="container">
<p id="texto"></p>
</div>

<audio autoplay loop>
<source src="musica.mp3">
</audio>

<script>

/* texto inicial digitando */

const introMensagem = `então tami eu sei que voce ta brava comigo mais eu te amo do fundo do meu coração 💜

mais enfim queria te conta um pouquinho de como tudo começou kk`;

let introIndex = 0;

function escreverIntro(){

if(introIndex < introMensagem.length){

document.getElementById("introTexto").innerHTML += introMensagem[introIndex];

introIndex++;

setTimeout(escreverIntro,40);

}

}

setTimeout(escreverIntro,3500);


/* corações caindo */

function criarCoracao(){

let coracao=document.createElement("div");

coracao.classList.add("coracao");

coracao.innerText="💜";

coracao.style.left=Math.random()*100+"vw";

coracao.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(coracao);

setTimeout(()=>{coracao.remove();},5000);

}

setInterval(criarCoracao,300);


/* troca intro para texto principal */

setTimeout(()=>{

document.querySelector(".titulo").style.display="none";

document.querySelector(".intro").style.display="none";

document.querySelector(".container").style.display="block";

window.scrollTo({
top:window.innerHeight,
behavior:"smooth"
});

},10000);


/* texto principal digitando */

const texto = `eu lembro que mesmo nas coisas simples você sempre deixava tudo mais especial, até quando a gente não tinha assunto direito ainda assim ficava em call só pela companhia um do outro. eu gostava dessas pequenas coisas, porque com você até o silêncio era bom.

eu sei que errei em alguns momentos e sei que isso te machucou, e não tem um dia que eu não pense nisso e não queria poder voltar no tempo pra fazer diferente.

tudo começou com uma pergunta de como arruma a luz do meu monitor kk depois disso nós passamos a conversar diariamente você sempre foi meio difícil nunca dava bola para minha indireta ou algo do tipo mas eu fui te conquistando aos poucos até chegar a parte que chegou na sua mãe ela contou pra sua família toda embora não gostamos disso mas era sempre uma experiência incrível ficar em call com você enquanto você trabalhava até mesmo quando você tomava banho até a hora de ir dormir que você tinha que me obrigar a ir dormir kk e sendo sincero hoje em dia isso está fazendo bastante falta.

essas maravilhas que eu tive com você acabam exatamente na madrugada do dia 04/04/2026 justamente no dia que nós estávamos fazendo 8 meses de namoro.

enfim na madrugada do dia 11/04/2026 nós conversamos choramos em call mas eu acabei pisando na bola de novo com você nós paramos de se falar novamente.

aí na madrugada do dia 19/04/2026 eu decidi te chamar para conversar nem que seja pela última vez acabei chorando pedi desculpas falei que te amava e pedi para você voltar comigo mesmo sabendo que você não iria aceitar.

sabendo que todos os seus amigos me odeiam incluindo a beca e ela é a única das suas amizades a ter direito de estar brava comigo.

eu só queria te falar que eu te amo demais eu realmente vou tentar te conquistar de novo me corrija no que você acha que eu estou errado converse comigo não fique sempre brava para mim te conquistar de novo eu vou precisar que você também me ajude com isso.

você foi a primeira garota que eu amei de verdade eu não quero que isso acabe assim ou que nós viremos dois estranhos um para o outro.

eu realmente quero te ver te sentir tocar em você fazer as coisas serem diferentes.

eu te amo muito tamires 💜`;

let i=0;

function escrever(){

if(i < texto.length){

if(texto.substring(i,i+9) == "eu te amo"){

document.getElementById("texto").innerHTML +=
"<span class='amor'>eu te amo</span>";

i+=9;

}else{

document.getElementById("texto").innerHTML += texto[i];

i++;

}

/* auto scroll acompanhando texto */

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

setTimeout(escrever,35);

}

}

setTimeout(escrever,10000);

</script>

</body>
</html>
